name: "14 · uv · flat · low threshold (B101 assert)"
# Expected: FAIL — B101 assert usage blocked at low threshold

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@674cb7133ca058d128f654c427add27f8a1df83b # v0.4.2
        with:
          working_directory: 14-uv-low-threshold
          tools: bandit
          bandit_scan_dirs: .
          bandit_severity_threshold: low
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
          artifact_name: security-audit-14
