name: "08 · poetry · src/ · bandit MEDIUM + pip-audit"
# Expected: FAIL — B303+B105 in src/ (MEDIUM threshold), AND vulnerable deps (cryptography, requests)

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1

      - name: Generate poetry.lock
        working-directory: 08-poetry-src-both
        run: poetry lock

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@2d95cbc2fed7ee39258437927fb78a89f84e4db2 # v0.2.0
        with:
          working_directory: 08-poetry-src-both
          package_manager: poetry
          bandit_scan_dirs: src/
          bandit_severity_threshold: medium
          pip_audit_block_on: all
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
