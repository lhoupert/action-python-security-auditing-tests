name: "11 · requirements · flat · clean (root working dir)"
# Expected: PASS — no bandit issues, no vulnerable deps, default working_directory

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@6fc9a707a040284c5bce28f0c49690f03b43a2c7 # v0.3.1
        with:
          package_manager: requirements
          requirements_file: 11-requirements-root/requirements.txt
          bandit_scan_dirs: 11-requirements-root
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
