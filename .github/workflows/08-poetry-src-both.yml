name: "08 · poetry · src/ · bandit MEDIUM + pip-audit"
# Expected: FAIL — B303+B105 in src/ (MEDIUM threshold), AND vulnerable deps (cryptography, requests)

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1

      - name: Generate poetry.lock
        working-directory: 08-poetry-src-both
        run: poetry lock

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@a3e6db325d9cf515d3861620774671bc01b12d63 # v0.3.2
        with:
          working_directory: 08-poetry-src-both
          package_manager: poetry
          bandit_scan_dirs: src/
          bandit_severity_threshold: medium
          pip_audit_block_on: all
          post_pr_comment: ${{ github.event_name == 'pull_request' }} # post_pr_comment: false # Disable PR comments for testing purposes; set to true to enable
          artifact_name: security-audit-08
