name: "09 · pipenv · flat · clean"
# Expected: PASS — no bandit issues, no vulnerable deps

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pipenv
        run: pip install pipenv

      - name: Generate Pipfile.lock
        working-directory: 09-pipenv-flat
        run: pipenv install

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@674cb7133ca058d128f654c427add27f8a1df83b # v0.4.2
        with:
          working_directory: 09-pipenv-flat
          package_manager: pipenv
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
          artifact_name: security-audit-09
