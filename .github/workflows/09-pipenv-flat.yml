name: "09 · pipenv · flat · clean"
# Expected: PASS — no bandit issues, no vulnerable deps

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.12'

      - name: Install pipenv
        run: pip install pipenv==2024.4.0

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@6791db45b1aea51db705d38978ad62b855b34b32 # v0.4.3
        with:
          working_directory: 09-pipenv-flat
          package_manager: pipenv
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
          artifact_name: security-audit-09
