name: "10 · pipenv · src/+scripts/ · bandit HIGH"
# Expected: FAIL — B602 (shell=True, HIGH) in both src/ and scripts/

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pipenv
        run: pip install pipenv

      - name: Generate Pipfile.lock
        working-directory: 10-pipenv-multi-bandit
        run: pipenv install

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@6fc9a707a040284c5bce28f0c49690f03b43a2c7 # v0.3.1
        with:
          working_directory: 10-pipenv-multi-bandit
          package_manager: pipenv
          bandit_scan_dirs: src/,scripts/
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
