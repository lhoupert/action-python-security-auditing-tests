name: "01 · requirements · flat · clean"
# Expected: PASS — no bandit issues, no vulnerable deps

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@a3e6db325d9cf515d3861620774671bc01b12d63 # v0.3.2
        with:
          working_directory: 01-requirements-flat
          package_manager: requirements
          requirements_file: requirements.txt
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
