name: "09 · pipenv · flat · clean"
# Expected: PASS — no bandit issues, no vulnerable deps

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pipenv
        run: pip install pipenv

      - name: Generate Pipfile.lock
        working-directory: 09-pipenv-flat
        run: pipenv install

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@78fde899ecb5148e5e3343d534e5bf6bd4e7b035 # v0.2.0
        with:
          working_directory: 09-pipenv-flat
          package_manager: pipenv
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
