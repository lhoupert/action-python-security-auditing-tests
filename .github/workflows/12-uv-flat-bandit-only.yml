name: "12 · uv · flat · bandit-only (no pip-audit)"
# Expected: FAIL — B602 subprocess call with shell=True

on:
  push:
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@a3e6db325d9cf515d3861620774671bc01b12d63 # v0.3.2
        with:
          working_directory: 12-uv-flat-bandit-only
          tools: bandit
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
