name: "07 · poetry · flat · clean"
# Expected: PASS — no bandit issues, no vulnerable deps

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1

      - name: Generate poetry.lock
        working-directory: 07-poetry-flat
        run: poetry lock

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@674cb7133ca058d128f654c427add27f8a1df83b # v0.4.2
        with:
          working_directory: 07-poetry-flat
          package_manager: poetry
          bandit_scan_dirs: .
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
          artifact_name: security-audit-07
