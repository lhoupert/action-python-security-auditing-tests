name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: integration-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── Smoke-test workflows (reusable) ───────────────────────────
  test-01:
    uses: ./.github/workflows/01-requirements-flat.yml
    permissions:
      contents: read
      pull-requests: write

  test-03:
    uses: ./.github/workflows/03-requirements-multi-both.yml
    permissions:
      contents: read
      pull-requests: write

  test-08:
    uses: ./.github/workflows/08-poetry-src-both.yml
    permissions:
      contents: read
      pull-requests: write

  # ── Validate results (only on PRs, after all tests) ────────────
  validate:
    if: always() && github.event_name == 'pull_request'
    needs:
      - test-01
      - test-03
      - test-08
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: security-audit-*
          path: artifacts

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate test outcomes
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: python .github/scripts/validate_results.py

      - name: Post or update PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f validation-report.md ]; then
            echo "No report generated" >&2
            exit 0
          fi

          MARKER="<!-- integration-test-validation-report -->"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Find existing comment with our marker
          COMMENT_ID=$(
            gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --paginate -q \
              ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -n 1
          )

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -F "body=@validation-report.md"
            echo "Updated existing comment ${COMMENT_ID}"
          else
            gh pr comment "${PR_NUMBER}" --body-file validation-report.md
            echo "Created new comment"
          fi
