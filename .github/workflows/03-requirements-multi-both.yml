name: "03 · requirements · src/+scripts/ · bandit+pip-audit"
# Expected: FAIL — B602 in src/, B105 in scripts/, AND vulnerable deps (requests, Pillow)

on:
  workflow_call:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run security audit
        uses: lhoupert/action-python-security-auditing@a3e6db325d9cf515d3861620774671bc01b12d63 # v0.3.2
        with:
          working_directory: 03-requirements-multi-both
          package_manager: requirements
          requirements_file: requirements.txt
          bandit_scan_dirs: src/,scripts/
          bandit_severity_threshold: high
          pip_audit_block_on: fixable
          post_pr_comment: ${{ github.event_name == 'pull_request' }}
          artifact_name: security-audit-03
